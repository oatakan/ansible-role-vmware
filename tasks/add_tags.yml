---

- name: ensure category exists
  vmware_category:
    hostname: "{{ lookup('env', 'VMWARE_HOST')|default(providers.vcenter.hostname) }}"
    username: "{{ lookup('env', 'VMWARE_USER')|default(providers.vcenter.username) }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD')|default(providers.vcenter.password) }}"
    validate_certs: no
    category_name: "{{ item }}"
    category_description: ""
    category_cardinality: 'multiple'
    state: present
  register: vcenter_category_info
  loop:
    - environment
    - app_name
    - role

- name: ensure tag names exists
  vmware_tag:
    hostname: "{{ lookup('env', 'VMWARE_HOST')|default(providers.vcenter.hostname) }}"
    username: "{{ lookup('env', 'VMWARE_USER')|default(providers.vcenter.username) }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD')|default(providers.vcenter.password) }}"
    validate_certs: no
    category_id: "{{ _category_id }}"
    tag_name: "{{ _tag_name }}"
    tag_description: ""
    state: present
  with_nested:
    - "{{ vmware_instances.results | default([]) }}"
    - "{{ vcenter_category_info.results }}"
  when:
    - item.0.result.instance is defined
    - _category_id is defined
    - _category_id | length
    - _tag_name | length
  vars:
    _category_id: "{{ item.1.category_results.category_id }}"
    _category_name: "{{ item.1.item }}"
    _tag_name: "{{ item.0.node[_category_name] | default('') }}"
  ignore_errors: yes

- name: ensure tags are attached
  vmware_tag_manager:
    hostname: "{{ lookup('env', 'VMWARE_HOST')|default(providers.vcenter.hostname) }}"
    username: "{{ lookup('env', 'VMWARE_USER')|default(providers.vcenter.username) }}"
    password: "{{ lookup('env', 'VMWARE_PASSWORD')|default(providers.vcenter.password) }}"
    validate_certs: no
    object_name: "{{ item.node.name }}"
    object_type: VirtualMachine
    state: present
    tag_names:
      - tag: "{{ item.node.environment | default('dev') }}"
        category: environment
      - tag: "{{ item.node.app_name | default('no_app_specified') }}"
        category: app_name
      - tag: "{{ item.node.role | default('no_role_specified') }}"
        category: role
  loop: "{{ vmware_instances.results | default([]) }}"
  when:
    - item.result.instance is defined
  ignore_errors: yes